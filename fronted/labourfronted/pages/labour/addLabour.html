<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Labour | Labour Management System</title>
  <link rel="stylesheet" href="../../style.css">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(120deg, #8b7d7d, #cbb8c0);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .register-container {
      background-color: #fff;
      width: 420px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      padding: 40px 50px;
      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    .register-container h2 {
      color: #ff4e50;
      font-weight: 700;
      font-size: 1.8rem;
      margin-bottom: 25px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      transition: 0.3s;
    }

    input:focus {
      border-color: #ff4e50;
      outline: none;
      box-shadow: 0 0 5px rgba(255, 78, 80, 0.4);
    }

    button, .main-btn {
      width: 100%;
      background-color: #ff4e50;
      color: #fff;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
      display: inline-block;
      text-decoration: none;
      text-align: center;
    }

    button:hover, .main-btn:hover {
      background-color: #c63ee8f7;
      transform: scale(1.03);
    }

    .back-btn {
      background-color: #6c63ff;
      margin-top: 10px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="register-container">
    <h2>Register Labour</h2>

    <form id="registerForm">
      <input id="fullname" placeholder="Full Name" required><br>
      <input id="age" type="number" placeholder="Age" required><br>
      <input id="skills" placeholder="Skills" required><br>
      <input id="location" placeholder="Location" required><br>
      <input id="contactNumber" placeholder="Contact Number" required><br>
      <button type="submit">Register</button>
      <a href="labour.html" class="main-btn back-btn"> Back Labour Dashboard</a>
    </form>
  </div>

  <!--  Backend Connection Script -->
  <script>
    const form = document.getElementById('registerForm');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const labourData = {
        fullname: document.getElementById('fullname').value.trim(),
        age: parseInt(document.getElementById('age').value),
        skills: document.getElementById('skills').value.trim(),
        location: document.getElementById('location').value.trim(),
        contactNumber: document.getElementById('contactNumber').value.trim()
      };

      try {
        const response = await fetch('http://localhost:8080/api/labours/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(labourData)
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`Server error: ${response.status} - ${errorText}`);
        }

        const result = await response.json();
        alert(` Labour Registered Successfully!\nName: ${result.fullname}\nLocation: ${result.location}`);
        form.reset();

      } catch (error) {
        console.error('Error:', error);
        alert(`Failed to register labour.\nError: ${error.message}\n\nPlease check if backend is running on port 8080.`);
      }
    });
  </script>

</body>
</html>
