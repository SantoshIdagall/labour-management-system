<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Update Labour | Labour Management System</title>
  <link rel="stylesheet" href="../style.css" />

  <style>
    /* 🌈 Full Page Green-Teal Background */
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #11998e, #38ef7d);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 📦 Form Card Box */
    .update-container {
      background-color: #fff;
      width: 420px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
      padding: 40px 50px;
      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    /* 🏷️ Heading */
    h2 {
      color: #11998e;
      font-weight: 700;
      font-size: 1.8rem;
      margin-bottom: 25px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ✏️ Input Fields */
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    input:focus {
      border-color: #11998e;
      outline: none;
      box-shadow: 0 0 6px rgba(17, 153, 142, 0.4);
    }

    /*  Buttons */
    .main-btn {
      display: block;
      width: 100%;
      text-align: center;
      padding: 12px;
      margin-top: 12px;
      background-color: #11998e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .main-btn:hover {
      background-color: #0f8a7f;
      transform: scale(1.05);
    }

    /*  Back Button (lighter tone) */
    .back-btn {
      background-color: #4fe19a;
    }

    .back-btn:hover {
      background-color: #30d87d;
    }

    /*  Fade Animation */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="update-container">
    <h2>Update Labour Details</h2>

    <form onsubmit="updateLabour(); return false;">
      <input id="id" type="number" placeholder="Enter Labour ID" required><br>
      <input id="fullname" placeholder="Full Name" required><br>
      <input id="age" type="number" placeholder="Age" required><br>
      <input id="skills" placeholder="Skills" required><br>
      <input id="location" placeholder="Location" required><br>
      <input id="contactNumber" placeholder="Contact Number" required><br>

      <!-- Update Button -->
      <button type="submit" class="main-btn">Update</button>

      <!-- Back Button -->
      <a href="../labour/labour.html" class="main-btn back-btn">Back Labour Dashboard</a>
    </form>
  </div>

  <script src="../script.js"></script>
</body>
</html>
