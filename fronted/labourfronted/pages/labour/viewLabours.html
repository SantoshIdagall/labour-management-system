<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Labours | Labour Management System</title>
  <link rel="stylesheet" href="../style.css" />

  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #141e30, #243b55);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 30px 10px;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      color: #333;
      width: 90%;
      max-width: 1000px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
      padding: 25px 30px 40px;
      animation: fadeIn 0.8s ease;
      text-align: center;
    }

    .container h2 {
      font-size: 2rem;
      color: #007acc;
      margin-bottom: 25px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .action-buttons {
      margin-bottom: 20px;
    }

    .btn {
      background-color: #007acc;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      margin: 5px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover { transform: scale(1.05); }

    .btn-danger { background-color: #dc3545; }
    .btn-danger:hover { background-color: #c82333; }

    .btn-green { background-color: #28a745; }
    .btn-green:hover { background-color: #218838; }

    table {
      border-collapse: collapse;
      width: 100%;
      background: white;
      color: #333;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
      font-size: 1.05rem;
    }

    th {
      background-color: #007acc;
      color: white;
      padding: 15px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    td {
      padding: 14px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    tr:nth-child(even) { background-color: #f2f2f2; }
    tr:hover { background-color: #e6f7ff; transition: 0.3s; }

    .loading { color: #007acc; font-weight: 600; margin: 15px 0; }
    .error { color: red; font-weight: 600; margin: 15px 0; }

    .back-btn {
      margin-top: 30px;
      padding: 12px 25px;
      background-color: #007acc;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: 0.3s;
    }

    .back-btn:hover {
      background-color: #005f99;
      transform: scale(1.05);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    /* ✨ Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 400px;
      text-align: left;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
      animation: fadeIn 0.5s ease;
    }

    .modal-content h3 {
      color: #007acc;
      text-align: center;
      margin-bottom: 15px;
    }

    .modal-content input {
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .modal-content button {
      background-color: #007acc;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      margin-right: 10px;
      cursor: pointer;
    }

    .modal-content button:hover { background-color: #005f99; }

    .cancel-btn { background-color: #dc3545; }
    .cancel-btn:hover { background-color: #c82333; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Manage Labours</h2>

    <div class="action-buttons">
      <button class="btn btn-green" onclick="openAddModal()"> Add Labour</button>
      <button class="btn btn-danger" onclick="deleteAllLabours()"> Delete All</button>
      <button class="btn btn-green" onclick="loadLabours()"> Refresh</button>
    </div>

    <p id="statusMessage" class="loading">Loading labours, please wait...</p>

    <table id="labourTable" style="display:none;">
      <thead>
        <tr>
          <th>ID</th>
          <th>Full Name</th>
          <th>Age</th>
          <th>Skill</th>
          <th>Location</th>
          <th>Contact</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <a href="../../welcome.html" class="back-btn">Back to Labour Management</a>

  <!-- 🧾 Add / Update Modal -->
  <div id="updateModal" class="modal">
    <div class="modal-content">
      <h3 id="modalTitle">Update Labour</h3>
      <input type="hidden" id="updateId" />
      <input id="updateFullname" placeholder="Full Name" required />
      <input id="updateAge" type="number" placeholder="Age" required />
      <input id="updateSkills" placeholder="Skills" required />
      <input id="updateLocation" placeholder="Location" required />
      <input id="updateContact" placeholder="Contact Number" required />
      <div style="text-align:center; margin-top:10px;">
        <button onclick="submitForm()"> Save</button>
        <button class="cancel-btn" onclick="closeModal()"> Cancel</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "http://localhost:8080/api/labours";
    const status = document.getElementById("statusMessage");
    const table = document.getElementById("labourTable");
    const tbody = document.querySelector("#labourTable tbody");
    const modal = document.getElementById("updateModal");
    const modalTitle = document.getElementById("modalTitle");
    let isAddMode = false;

    // Load all labours
    async function loadLabours() {
      try {
        const response = await fetch(`${API_BASE}/all`);
        if (!response.ok) throw new Error(`Server returned ${response.status}`);
        const labours = await response.json();

        tbody.innerHTML = "";
        if (labours.length === 0) {
          status.textContent = " No labours found.";
          status.className = "error";
          return;
        }

        status.style.display = "none";
        table.style.display = "table";

        labours.forEach(l => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${l.id}</td>
            <td>${l.fullname}</td>
            <td>${l.age}</td>
            <td>${l.skills}</td>
            <td>${l.location}</td>
            <td>${l.contactNumber}</td>
            <td>
              <button class="btn btn-green" onclick="openEditModal(${l.id}, '${l.fullname}', ${l.age}, '${l.skills}', '${l.location}', '${l.contactNumber}')"> Edit</button>
              <button class="btn btn-danger" onclick="deleteLabour(${l.id})">Delete</button>
            </td>
          `;
          tbody.appendChild(row);
        });
      } catch (error) {
        console.error("Error loading labours:", error);
        status.textContent = ` Failed to load labours: ${error.message}`;
        status.className = "error";
      }
    }

    // 🟢 Open Add Modal
    function openAddModal() {
      isAddMode = true;
      modalTitle.textContent = "Add New Labour";
      modal.style.display = "flex";
      clearModalFields();
    }

    // ✏️ Open Edit Modal
    function openEditModal(id, fullname, age, skills, location, contact) {
      isAddMode = false;
      modalTitle.textContent = "Update Labour";
      modal.style.display = "flex";
      document.getElementById("updateId").value = id;
      document.getElementById("updateFullname").value = fullname;
      document.getElementById("updateAge").value = age;
      document.getElementById("updateSkills").value = skills;
      document.getElementById("updateLocation").value = location;
      document.getElementById("updateContact").value = contact;
    }

    // 🧹 Clear Modal Fields
    function clearModalFields() {
      document.getElementById("updateId").value = "";
      document.getElementById("updateFullname").value = "";
      document.getElementById("updateAge").value = "";
      document.getElementById("updateSkills").value = "";
      document.getElementById("updateLocation").value = "";
      document.getElementById("updateContact").value = "";
    }

    // 🔴 Close Modal
    function closeModal() {
      modal.style.display = "none";
    }

    // 💾 Submit (Add or Update)
    async function submitForm() {
      const id = document.getElementById("updateId").value;
      const labourData = {
        fullname: document.getElementById("updateFullname").value.trim(),
        age: parseInt(document.getElementById("updateAge").value),
        skills: document.getElementById("updateSkills").value.trim(),
        location: document.getElementById("updateLocation").value.trim(),
        contactNumber: document.getElementById("updateContact").value.trim()
      };

      try {
        let response;
        if (isAddMode) {
          response = await fetch(`${API_BASE}/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(labourData)
          });
        } else {
          response = await fetch(`${API_BASE}/update/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(labourData)
          });
        }

        if (!response.ok) throw new Error(`Server returned ${response.status}`);
        alert(isAddMode ? " Labour added successfully!" : " Labour updated successfully!");
        closeModal();
        loadLabours();
      } catch (error) {
        alert(` Operation failed: ${error.message}`);
      }
    }

    // 🗑️ Delete one labour
    async function deleteLabour(id) {
      if (!confirm("Are you sure you want to delete this labour?")) return;
      try {
        const response = await fetch(`${API_BASE}/delete/${id}`, { method: "DELETE" });
        if (!response.ok) throw new Error(`Server returned ${response.status}`);
        alert(" Labour deleted successfully!");
        loadLabours();
      } catch (error) {
        alert(` Failed to delete: ${error.message}`);
      }
    }

    // 🗑️ Delete all labours
    async function deleteAllLabours() {
      if (!confirm(" This will delete ALL labours! Continue?")) return;
      try {
        const response = await fetch(`${API_BASE}/deleteAll`, { method: "DELETE" });
        if (!response.ok) throw new Error(`Server returned ${response.status}`);
        alert(" All labours deleted successfully!");
        loadLabours();
      } catch (error) {
        alert(` Failed to delete all: ${error.message}`);
      }
    }

    // Close modal if clicked outside
    window.onclick = function (event) {
      if (event.target === modal) closeModal();
    };

    window.onload = loadLabours;
  </script>
</body>
</html>
