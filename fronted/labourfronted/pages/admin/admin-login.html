<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Labour Management System</title>
  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #1e1f4b, #4b0082);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      background: #ffffff;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
      width: 380px;
      padding: 40px 45px;
      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    h2 {
      color: #4b0082;
      font-weight: 700;
      margin-bottom: 25px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    input:focus {
      border-color: #4b0082;
      box-shadow: 0 0 6px rgba(75, 0, 130, 0.4);
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background-color: #0033ff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background-color: #e600d3;
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Admin Login</h2>
    <form id="adminLoginForm">
      <input type="text" id="username" placeholder="Enter Username" required>
      <input type="email" id="gmail" placeholder="Enter Gmail" required>
      <input type="password" id="password" placeholder="Enter Password" required>
      <button type="submit">Login</button>
    </form>
  </div>

  <!--  FIXED: Correct script tag -->
  <script>
  document.getElementById("adminLoginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const gmail = document.getElementById("gmail").value.trim();
    const password = document.getElementById("password").value.trim();

    //  Send login request to backend
    fetch("http://localhost:8080/api/admin/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        username: username,
        email: gmail,
        password: password
      })
    })
    .then(res => {
      if (!res.ok) throw new Error("Invalid credentials");
      return res.json();
    })
    .then(admin => {
      alert("✅ Login successful!");
      localStorage.setItem("admin", JSON.stringify(admin));
      window.location.href = "./admin-dashboard.html";
    })
    .catch(err => {
      alert(" Error connecting to backend! Check if Spring Boot is running.");
      console.error("Error:", err);
    });
  });
  </script>

</body>
</html>
