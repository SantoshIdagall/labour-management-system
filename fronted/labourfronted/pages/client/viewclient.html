<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Clients | Labour Management System</title>
  <link rel="stylesheet" href="../style.css" />

  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #2193b0, #6dd5ed);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 30px 10px;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      color: #333;
      width: 90%;
      max-width: 1000px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
      padding: 25px 30px 40px;
      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    h2 {
      font-size: 2rem;
      color: #007acc;
      margin-bottom: 25px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn {
      background-color: #007acc;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      margin: 5px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover { transform: scale(1.05); }

    .btn-green { background-color: #28a745; }
    .btn-green:hover { background-color: #218838; }

    .btn-danger { background-color: #dc3545; }
    .btn-danger:hover { background-color: #c82333; }

    table {
      border-collapse: collapse;
      width: 100%;
      background: white;
      color: #333;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
      font-size: 1.05rem;
      margin-top: 15px;
    }

    th {
      background-color: #007acc;
      color: white;
      padding: 15px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    td {
      padding: 14px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    tr:nth-child(even) { background-color: #f2f2f2; }
    tr:hover { background-color: #e6f7ff; transition: 0.3s; }

    .back-btn {
      margin-top: 25px;
      padding: 12px 25px;
      background-color: #007acc;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: 0.3s;
    }

    .back-btn:hover {
      background-color: #005f99;
      transform: scale(1.05);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 400px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
      text-align: left;
    }

    .modal-content h3 {
      text-align: center;
      color: #007acc;
      margin-bottom: 15px;
    }

    .modal-content input {
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .modal-content button {
      background-color: #007acc;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      margin-right: 10px;
      cursor: pointer;
    }

    .cancel-btn {
      background-color: #dc3545;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Manage Clients</h2>

    <div>
      <button class="btn btn-green" onclick="openAddModal()">Add Client</button>
      <button class="btn btn-danger" onclick="deleteAllClients()"> Delete All</button>
      <button class="btn btn-green" onclick="loadClients()">Refresh</button>
    </div>

    <table id="clientTable" style="display:none;">
      <thead>
        <tr>
          <th>ID</th>
          <th>Full Name</th>
          <th>Phone Number</th>
          <th>Location</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <a href="../../welcome.html" class="back-btn">⬅ Back to Labour Management</a>

  <!-- Add / Edit Modal -->
  <div id="clientModal" class="modal">
    <div class="modal-content">
      <h3 id="modalTitle">Add Client</h3>
      <input type="hidden" id="clientId" />
      <input id="clientFullName" placeholder="Full Name" required />
      <input id="clientPhone" placeholder="Phone Number" required />
      <input id="clientLocation" placeholder="Location" required />
      <div style="text-align:center;margin-top:10px;">
        <button onclick="submitClient()"> Save</button>
        <button class="cancel-btn" onclick="closeModal()">✖ Cancel</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "http://localhost:8080/api/clients";
    const table = document.getElementById("clientTable");
    const tbody = document.querySelector("#clientTable tbody");
    const modal = document.getElementById("clientModal");
    const modalTitle = document.getElementById("modalTitle");
    let isAddMode = false;

    async function loadClients() {
      try {
        const response = await fetch(`${API_BASE}/all`);
        if (!response.ok) throw new Error("Failed to fetch clients");
        const clients = await response.json();

        tbody.innerHTML = "";
        if (clients.length === 0) {
          table.style.display = "none";
          alert("No clients found!");
          return;
        }

        table.style.display = "table";
        clients.forEach(c => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${c.id}</td>
            <td>${c.fullName}</td>
            <td>${c.phoneNumber}</td>
            <td>${c.location || '-'}</td>
            <td>
              <button class="btn btn-green" onclick="openEditModal(${c.id}, '${c.fullName}', '${c.phoneNumber}', '${c.location || ''}')"> Edit</button>
              <button class="btn btn-danger" onclick="deleteClient(${c.id})"> Delete</button>
            </td>`;
          tbody.appendChild(row);
        });
      } catch (err) {
        alert("Error loading clients: " + err.message);
      }
    }

    // 🟢 Open Add Modal
    function openAddModal() {
      isAddMode = true;
      modalTitle.textContent = "Add New Client";
      clearModalFields();
      modal.style.display = "flex";
    }

    // ✏️ Open Edit Modal
    function openEditModal(id, fullName, phone, location) {
      isAddMode = false;
      modalTitle.textContent = "Update Client";
      modal.style.display = "flex";
      document.getElementById("clientId").value = id;
      document.getElementById("clientFullName").value = fullName;
      document.getElementById("clientPhone").value = phone;
      document.getElementById("clientLocation").value = location;
    }

    // 🧹 Clear Modal Fields
    function clearModalFields() {
      document.getElementById("clientId").value = "";
      document.getElementById("clientFullName").value = "";
      document.getElementById("clientPhone").value = "";
      document.getElementById("clientLocation").value = "";
    }

    // 🔴 Close Modal
    function closeModal() {
      modal.style.display = "none";
    }

    // 💾 Submit Add / Update
    async function submitClient() {
      const id = document.getElementById("clientId").value;
      const clientData = {
        fullName: document.getElementById("clientFullName").value.trim(),
        phoneNumber: document.getElementById("clientPhone").value.trim(),
        location: document.getElementById("clientLocation").value.trim()
      };

      try {
        let response;
        if (isAddMode) {
          response = await fetch(`${API_BASE}/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(clientData)
          });
        } else {
          response = await fetch(`${API_BASE}/update/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(clientData)
          });
        }

        if (!response.ok) throw new Error("Server error");
        alert(isAddMode ? " Client added successfully!" : " Client updated successfully!");
        closeModal();
        loadClients();
      } catch (err) {
        alert(" Operation failed: " + err.message);
      }
    }

    // 🗑️ Delete single client
    async function deleteClient(id) {
      if (!confirm("Are you sure you want to delete this client?")) return;
      try {
        const response = await fetch(`${API_BASE}/delete/${id}`, { method: "DELETE" });
        if (!response.ok) throw new Error("Failed to delete");
        alert(" Client deleted successfully!");
        loadClients();
      } catch (err) {
        alert(" Delete failed: " + err.message);
      }
    }

    // 🚨 Delete all clients (optional endpoint)
    async function deleteAllClients() {
      if (!confirm(" This will delete ALL clients! Continue?")) return;
      try {
        const response = await fetch(`${API_BASE}/deleteAll`, { method: "DELETE" });
        if (!response.ok) throw new Error("Failed to delete all");
        alert(" All clients deleted successfully!");
        loadClients();
      } catch (err) {
        alert(" Failed to delete all: " + err.message);
      }
    }

    window.onclick = e => { if (e.target === modal) closeModal(); };
    window.onload = loadClients;
  </script>
</body>
</html>
